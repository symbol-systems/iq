- JASON CALACANIS is a technology entrepreneur, angel investor, and the host of
  the popular weekly podcast This Week in Startups. He's the founder of a series
  of conferences that bring entrepreneurs together with potential investors. As
  a “scout” for top-tier Silicon Valley venture capital firm Sequoia Capital and
  later as an angel investor, Jason has invested in 150 early-stage startups including
  4 that have achieved billion-dollar valuations (so far).
- 'Over the past twenty-five years, Jason Calacanis has made a fortune investing
  in creators, spotting and helping build and fund a number of successful technology
  startups—investments that have earned him tens of millions of dollars. Now,
  in this enlightening guide that is sure to become the bible for twenty-first
  century investors, Calacanis takes potential angels step-by-step through his
  proven method of creating massive wealth: startups.'
- As Calacanis makes clear, you can get rich—even if you came from humble beginnings
  (his dad was a bartender, his mom a nurse), didn’t go to the right schools,
  and weren’t a top student. The trick is learning how angel investors think.
  Calacanis takes you inside the minds of these successful moneymen, helping you
  understand how they prioritize and make the decisions that have resulted in
  phenomenal profits.
- The trick is learning how angel investors think. Calacanis takes you inside
  the minds of these successful moneymen, helping you understand how they prioritize
  and make the decisions that have resulted in phenomenal profits. He guides you
  step by step through the process, revealing how leading investors evaluate new
  ventures, calculating the risks and rewards, and explains how the best startups
  leverage relationships with angel investors for the best results.
