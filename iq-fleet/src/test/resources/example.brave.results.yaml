  of conferences that bring entrepreneurs together with potential investors. As
  a “scout” for top-tier Silicon Valley venture capital firm Sequoia Capital and
  later as an angel investor, Jason has invested in 150 early-stage startups including
  4 that have achieved billion-dollar valuations (so far).
- ". . .Mr. Calacanis was one of the earliest scouts and ran an online news startup
  called Inside.com, in which Sequoia had invested.” — The Wall Street Journal
