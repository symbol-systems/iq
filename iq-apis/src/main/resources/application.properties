# Application-specific settings
iq.realm.token.duration=600
iq.realm.vox.maxLength=10240000
quarkus.application.ui-header=IQ APIs

# Server and HTTP settings
quarkus.http.port=8080
quarkus.http.limits.max-body-size=10M
quarkus.http.limits.max-form-attribute-size=10M
quarkus.http.limits.max-upload-size=10M

# CORS configuration (required for MCP inspector and cross-origin clients)
quarkus.http.cors=true
quarkus.http.cors.origins=*
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Accept,Authorization
quarkus.http.cors.expose-headers=Content-Type,X-Custom-Header
quarkus.http.cors.access-control-max-age=24h
quarkus.http.cors.access-control-allow-credentials=true

# OpenAPI configuration
mp.openapi.scan.disable=true
quarkus.smallrye-openapi.enable=false
quarkus.smallrye-openapi.info-title=IQ API
%dev.quarkus.smallrye-openapi.info-title=IQ API (development)
%test.quarkus.smallrye-openapi.info-title=IQ API (test)
quarkus.smallrye-openapi.info-version=1.0.1
quarkus.smallrye-openapi.info-description=OpenAPI for IQ
quarkus.smallrye-openapi.info-terms-of-service=https://smarttrust.ai/about/ts_and_cs
quarkus.smallrye-openapi.info-contact-email=support@smarttrust.ai
quarkus.smallrye-openapi.info-contact-name=IQ API Support
quarkus.smallrye-openapi.info-contact-url=https://smarttrust.ai/contact
quarkus.smallrye-openapi.info-license-name=Apache 2.0
quarkus.smallrye-openapi.info-license-url=https://www.apache.org/licenses/LICENSE-2.0.html

# Logging configuration
quarkus.log.level=INFO
# quarkus.log.manager=org.jboss.logmanager.LogManager
quarkus.log.file.enable=true
quarkus.log.file.path=logs/application.log
quarkus.log.file.format=%d{yyyy-MM-dd HH:mm:ss} %-5p [%c{2.}] (%t) %s%e%n
quarkus.log.file.rotation.file-suffix=.yyyy-MM-dd
quarkus.log.file.rotation.max-file-size=10M
quarkus.log.file.rotation.max-backup-index=5

# Container image configuration
quarkus.container-image.name=iq-apis

# Development and testing settings
quarkus.live-reload.instrumentation=true

# OpenTelemetry and Tracing Configuration
# Note: OTLP exporter requires an OpenTelemetry Collector running at the configured endpoint
# To enable OTLP export, set environment variables:
#   OTEL_EXPORTER_OTLP_ENDPOINT=http://otel-collector:4317
#   OTEL_EXPORTER_OTLP_PROTOCOL=grpc
quarkus.otel.enabled=true
quarkus.otel.traces.exporter=jaeger
quarkus.otel.service.name=iq-apis
quarkus.otel.service.version=${project.version:0.94.1}

# Tracing Sampler Configuration
quarkus.otel.traces.sampler=parentbased_always_on
quarkus.otel.traces.sampler.arg=0.9

# Metrics Configuration
quarkus.micrometer.enabled=true
quarkus.micrometer.export.prometheus.enabled=true

# Disable telemetry in development mode if not needed
%dev.quarkus.otel.enabled=false
%dev.quarkus.micrometer.enabled=true
quarkus.banner.enabled=false
quarkus.console.enabled=false
quarkus.analytics.disabled=true

# Management endpoints (already provided via quarkus-smallrye-health/quarkus-smallrye-metrics)
# quarkus.management.endpoints.enabled=true
# quarkus.management.endpoints.web.expose=health,metrics,config,env,info,shutdown,beans

# Class scanning (legacy key removed to avoid unrecognized-key warnings)
# quarkus.arc.scan-packages=systems.symbol.realm,systems.symbol.controller.platform,systems.symbol.controller.ux

# Native image resources
quarkus.native.resources.includes=public/**
