# Test-specific configuration for OAuth and cluster infrastructure

# OAuth test client configuration
iq.oauth.issuer=http://localhost:8080
iq.oauth.token.duration=3600
iq.oauth.keystore.path=./tested/tmp/oauth/keys

# Disable live reload and analytics for tests
quarkus.live-reload.instrumentation=false
quarkus.analytics.disabled=true

# Test logging
quarkus.log.level=INFO
%test.quarkus.log.category."systems.symbol".level=DEBUG
