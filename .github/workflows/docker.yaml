name: Build IQ Docker Image

on:
  push:
    branches:
      - main
  workflow_run:
    workflows: ["Build IQ Jars"]
    types:
      - completed

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Code
        uses: actions/checkout@v3

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'adopt'

      - name: Set up Docker BuildX (for cross-platform builds)
        uses: docker/setup-buildx-action@v2

      - name: Log in to GitHub Docker Registry
        run: echo "${{ secrets.GITHUB_TOKEN }}" | docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build and push Quarkus Docker image
        run: mvn package -Dquarkus.container-image.build=true -Dquarkus.container-image.push=true

      - name: Tag Docker image as latest
        run: |
          docker tag ghcr.io/${{ github.repository_owner }}/iq-runtime:${{ github.sha }} ghcr.io/${{ github.repository_owner }}/iq-runtime:latest
          docker push ghcr.io/${{ github.repository_owner }}/iq-runtime:latest
